<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard - PowerOutage Tracker</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <a class="navbar-brand" href="index.html">
                ⚡ PowerOutage Tracker
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">

                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Notifications
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Analytics
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link logout-btn" href="#" onclick="logout()">
                            Logout
                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container py-4">

        <!-- Welcome Section -->
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-4">

            <div>
                <h2 class="mb-2">Dashboard Overview</h2>
                <p class="mb-0">
                    Welcome back,
                    <span id="username"></span>
                </p>
            </div>

            <button class="btn btn-primary mt-3 mt-md-0">
                + Create Report
            </button>

        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">

            <div class="col-xl-3 col-md-6">
                <div class="card stats-card primary-card">
                    <div class="card-body">
                        <div class="stats-title">Total Reports</div>
                        <div class="stats-number" id="totalReports">0</div>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6">
                <div class="card stats-card warning-card">
                    <div class="card-body">
                        <div class="stats-title">Pending Reports</div>
                        <div class="stats-number" id="pendingReports">0</div>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6">
                <div class="card stats-card info-card">
                    <div class="card-body">
                        <div class="stats-title">In Progress</div>
                        <div class="stats-number" id="inProgressReports">0</div>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6">
                <div class="card stats-card success-card">
                    <div class="card-body">
                        <div class="stats-title">Resolved Reports</div>
                        <div class="stats-number" id="resolvedReports">0</div>
                    </div>
                </div>
            </div>

        </div>

        <!-- MAP -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Outage Map</h5>
                    </div>
                    <div class="card-body">
                        <div id="map" style="height: 400px; width: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Report -->
        <div class="row mb-4">

            <div class="col-12">

                <div class="card">

                    <div class="card-header">
                        <h5>Report New Outage</h5>
                    </div>

                    <div class="card-body">

                        <form id="reportForm">

                            <div class="row">

                                <div class="col-lg-6 mb-3">
                                    <label class="form-label">Location</label>
                                    <input type="text" class="form-control" id="location" required />
                                </div>

                                <div class="col-lg-6 mb-3">
                                    <label class="form-label">Severity</label>
                                    <select class="form-select" id="severity" required>
                                        <option value="">Select</option>
                                        <option value="low">Low</option>
                                        <option value="medium">Medium</option>
                                        <option value="high">High</option>
                                        <option value="critical">Critical</option>
                                    </select>
                                </div>

                            </div>

                            <div class="row">

                                <div class="col-lg-6 mb-3">
                                    <label class="form-label">Outage Type</label>
                                    <select class="form-select" id="outageType" required>
                                        <option value="">Select</option>
                                        <option value="power_outage">Power Outage</option>
                                        <option value="voltage_fluctuation">Voltage Fluctuation</option>
                                        <option value="partial_outage">Partial Outage</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>

                                <div class="col-lg-6 mb-3">
                                    <label class="form-label">Description</label>
                                    <textarea class="form-control" id="description"></textarea>
                                </div>

                            </div>

                            <button class="btn btn-primary" type="submit">
                                Submit Report
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

        <!-- Reports Table -->
        <div class="row">

            <div class="col-12">

                <div class="card">

                    <div class="card-header">
                        <h5>My Reports</h5>
                    </div>

                    <div class="card-body">

                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Location</th>
                                    <th>Severity</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="reportsTable"></tbody>
                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Scripts (IMPORTANT ORDER) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>

</body>
</html>
